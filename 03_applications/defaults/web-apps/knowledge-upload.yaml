env:
  DEFAULT_MAX_TOKENS_USED_FOR_METADATA_EXTRACTION: 10000
  MAX_FILE_SIZE_IN_MB: 512
  MAX_FILES: 200
  MAX_HEAP_MB: 350
  METADATA_EXTRACTION_LANGUAGE_MODELS: "AZURE_GPT_4o_2024_0806:GPT-4o (2024-08-06),AZURE_GPT_4o_2024_1120:GPT-4o (2024-11-20)"
nodeSelector:
  scalability: steady
  lifecycle: persistent
probes:
  liveness:
    httpGet:
      path: /knowledge-upload/api/health
      port: http
    initialDelaySeconds: 5
  readiness:
    httpGet:
      path: /knowledge-upload/api/health
      port: http
    initialDelaySeconds: 5
replicaCount: 2
resources:
  limits:
    cpu: 300m
    memory: 500Mi
  requests:
    cpu: 300m
    memory: 450Mi
routes:
  gateway:
    namespace: unique
  pathPrefix: /knowledge-upload
  paths:
    default:
      enabled: true
strategy:
  type: Recreate
