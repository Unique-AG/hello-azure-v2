env:
  LOG_LEVEL: info
  MAX_HEAP_MB: 400
  PG_DATABASE_SSL_MODE: "verify"
  SCOPE_MANAGEMENT_API_URL: http://backend-service-scope-management.unique.svc
hooks:
  migration:
    command: |
      cd /home/node/app/services/node-app-repository/prisma; pnpm exec prisma migrate deploy --config ../prisma.config.ts;
    enabled: true
nodeSelector:
  scalability: steady
  lifecycle: persistent
probes:
  enabled: false
replicaCount: 1
resources:
  limits:
    memory: 550Mi
  requests:
    cpu: 300m
    memory: 500Mi
routes:
  gateway:
    namespace: unique
  pathPrefix: /apps
  paths:
    default:
      enabled: true
    probe:
      enabled: true
serviceAccount:
  enabled: true
  workloadIdentity:
    clientId:
    enabled: true
envVars:
  - name: AMQP_USERNAME
    valueFrom:
      secretKeyRef:
        name: rabbitmqcluster-chat-default-user
        key: username
  - name: AMQP_PASSWORD
    valueFrom:
      secretKeyRef:
        name: rabbitmqcluster-chat-default-user
        key: password
  - name: AMQP_HOST
    valueFrom:
      secretKeyRef:
        name: rabbitmqcluster-chat-default-user
        key: host
  - name: AMQP_PORT
    valueFrom:
      secretKeyRef:
        name: rabbitmqcluster-chat-default-user
        key: port
