# Argo CD repository credentials for private OCI Helm charts in tenant ACR.
# Key Vault secrets (helloazuresensitive / hakv2{env}) are provisioned by Terraform:
#   02_infrastructure/day-2/35-acr-argocd-helm-pull.tf
#   - uqhacrtest-azurecr-io-username
#   - uqhacrtest-azurecr-io-password
extraObjects:
  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: uqhacrtest-azurecr-io-helm-creds
      annotations:
        external-secrets.io/managed: "true"
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: SecretStore
        name: helloazuresensitive
      target:
        name: uqhacrtest-azurecr-io-helm-creds
        template:
          metadata:
            labels:
              app.kubernetes.io/part-of: argocd
              argocd.argoproj.io/secret-type: repository
          data:
            enableOCI: "true"
            forceHttpBasicAuth: "true"
            username: '{{ printf "{{ .username }}" }}'
            password: '{{ printf "{{ .password }}" }}'
            url: uqhacrtest.azurecr.io/helm
            type: helm
      data:
        - secretKey: username
          remoteRef:
            key: uqhacrtest-azurecr-io-username
        - secretKey: password
          remoteRef:
            key: uqhacrtest-azurecr-io-password
  - apiVersion: external-secrets.io/v1beta1
    kind: ExternalSecret
    metadata:
      name: uqhacrtest-azurecr-io-creds-oci
      annotations:
        external-secrets.io/managed: "true"
    spec:
      refreshInterval: 1h
      secretStoreRef:
        kind: SecretStore
        name: helloazuresensitive
      target:
        name: uqhacrtest-azurecr-io-creds-oci
        template:
          metadata:
            labels:
              app.kubernetes.io/part-of: argocd
              argocd.argoproj.io/secret-type: repo-creds
          data:
            type: oci
            enableOCI: "true"
            forceHttpBasicAuth: "true"
            username: '{{ printf "{{ .username }}" }}'
            password: '{{ printf "{{ .password }}" }}'
            url: oci://uqhacrtest.azurecr.io
      data:
        - secretKey: username
          remoteRef:
            key: uqhacrtest-azurecr-io-username
        - secretKey: password
          remoteRef:
            key: uqhacrtest-azurecr-io-password
