name: '[test][rel] Mirror Unique Release 🪞'

on:
  push:
    branches:
      - preview
    paths:
      - .github/workflows/test.mirror-unique-artifacts.yaml
      - mirroring/test/app.unique.yaml
  workflow_dispatch:


permissions:
  contents: read
  id-token: write # This is required for requesting the JWT
  pull-requests: write # To write comments

env:
  UNIQUECR_USERNAME: ext-hello-azure-v2 
  # NOTE: This is the token name for the Azure Container Registy (ACR) called "uniquecr" inside of "Unique AG Subscription to Azure" subscription ("Unique AG" directory).
  # UNIQUECR_PASSWORD is configured as a GitHub secret on the hello-azure-v2 repository, and holds a value for the ext-hello-azure-v2 token.
  # Please note how uniquecr does not have admin user enabled, so instead ACR tokens are used to authenticate.

jobs:
  clone-release:
    environment: 20-wl
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: mirroring/test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Install node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0

      - name: Azure Login action
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 #v2.3.0
        with:
          subscription-id: 782871a0-bcee-44fb-851f-ccd3e69ada2a
          tenant-id: aeade8c4-d4f7-4ae7-9149-4975fa3a7f91
          client-id: 6d1d8c4b-9d1b-4113-a91a-dac89b2717c1 # Enterprise Application Registration (Terraform) -> Application (client) id

      - name: Install unique-ag/cli
        run: npm install -g @unique-ag/cli@0.5.1

      - name: Mirror Unique release artifacts
        timeout-minutes: 60
        run: |
          set -euo pipefail

          SOURCE_REGISTRY="$(awk -F': ' '/^sourceRegistry:/{print $2; exit}' app.unique.yaml)"
          TARGET_REGISTRY="$(awk -F': ' '/^targetRegistryName:/{print $2; exit}' app.unique.yaml)"
          mapfile -t IMAGES < <(awk -F': ' '/^[[:space:]]*- name:/{print $2}' app.unique.yaml)

          for IMAGE in "${IMAGES[@]}"; do
            echo "Importing ${SOURCE_REGISTRY}/${IMAGE} -> ${TARGET_REGISTRY}/${IMAGE}"

            set +e
            IMPORT_OUTPUT="$(az acr import \
              --name "${TARGET_REGISTRY}" \
              --source "${SOURCE_REGISTRY}/${IMAGE}" \
              --image "${IMAGE}" \
              --username "${{ env.UNIQUECR_USERNAME }}" \
              --password "${{ secrets.UNIQUECR_PASSWORD }}" \
              2>&1)"
            IMPORT_EXIT_CODE=$?
            set -e

            if [ "${IMPORT_EXIT_CODE}" -eq 0 ]; then
              continue
            fi

            if [[ "${IMPORT_OUTPUT}" == *"Code: Conflict"* && "${IMPORT_OUTPUT}" == *"already exists in target registry"* ]]; then
              echo "Image already exists in target registry, skipping: ${IMAGE}"
              continue
            fi

            echo "${IMPORT_OUTPUT}"
            exit "${IMPORT_EXIT_CODE}"
          done