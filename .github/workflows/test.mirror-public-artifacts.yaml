name: '[test][rel] Mirror Public Artifacts 🪞'

on:
  push:
    branches:
      - preview
    paths:
      - .github/workflows/test.mirror-public-artifacts.yaml
      - mirroring/test/io.docker.yaml
      - mirroring/test/io.ghcr.yaml
      - mirroring/test/io.quay.yaml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # This is required for requesting the JWT
  pull-requests: write # To write comments

jobs:
  import:
    environment: 20-wl
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: mirroring/test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Install node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0

      - name: Azure Login action
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 #v2.3.0
        with:
          subscription-id: 782871a0-bcee-44fb-851f-ccd3e69ada2a
          tenant-id: aeade8c4-d4f7-4ae7-9149-4975fa3a7f91
          client-id: 6d1d8c4b-9d1b-4113-a91a-dac89b2717c1 # Enterprise Application Registration (Terraform) -> Application (client) id

      - name: Install unique-ag/cli
        run: npm install -g @unique-ag/cli@0.5.1

      - name: Mirror public artifacts
        timeout-minutes: 15
        run: |
          az acr login --name uqhacrtest
          qcli mirror images -f io.docker.yaml
          qcli mirror images -f io.ghcr.yaml
          qcli mirror images -f io.quay.yaml
