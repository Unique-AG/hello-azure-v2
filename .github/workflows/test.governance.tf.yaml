name: '[tf] [test] Governance 🔐'
on:
  workflow_dispatch: 
  pull_request:
    branches:
      - preview
      - '!release'
      - '!main'
    paths:
      - .github/workflows/test.governance.tf.yaml
      - 01_bootstrap/environments/test/**
  push:
    branches:
      - preview
    paths:
      - .github/workflows/test.governance.tf.yaml
      - 01_bootstrap/environments/test/**

permissions:
  contents: read
  pull-requests: write # To write comments
  id-token: write

jobs:
  automated-plan-apply:
    environment: 00-init
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: 01_bootstrap/environments/test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      
      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 #v4.0.0
        with:
          terraform_version: 1.12.0
      
      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check
        continue-on-error: true
      
      - name: Terraform Init
        id: init
        run: terraform init -backend-config=config.auto.tfvars
      
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
      
      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
      
      - name: Terraform Apply
        if: ${{ github.event.ref == 'refs/heads/preview' }}
        run: terraform apply -auto-approve -input=false
      
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea #v7.0.1
        if: github.event_name == 'pull_request'
        env:
          PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
        with:
          script: |
            // 1. Retrieve existing bot comments for the PR
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Terraform Format and Style')
            })

            // 2. Prepare format of the comment
            const output = ` ### Automated Terraform Plan
            #### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`\n
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Env: \`${{ env.ENVIRONMENT }}\`, Workflow: \`${{ github.workflow }}\`*`;
            const contentPlan = process.env.PLAN

            // 3. If we have a comment, update it, otherwise create a new one
            if (botComment) {
              if (contentPlan.includes("No changes. Your infrastructure matches the configuration.")) {
                github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id
                })
              } else {
                github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: output
                })
              }
            } else {
              if (contentPlan.includes("No changes. Your infrastructure matches the configuration.") == false) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: output
                })
              }
            }